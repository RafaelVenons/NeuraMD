services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://neuramd:neuramd@postgres:5432/neura_md_production
      POSTGRES_USER: neuramd
      POSTGRES_PASSWORD: neuramd
      POSTGRES_HOST: postgres
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_ENV: production
      STORAGE_SERVICE: local
      REDIS_URL: redis://redis:6379/0
      # AI providers — add keys as needed
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_ANTHROPIC_API_KEY: ${AI_ANTHROPIC_API_KEY:-}
      # TTS providers
      TTS_ELEVENLABS_API_KEY: ${TTS_ELEVENLABS_API_KEY:-}
      TTS_FISH_AUDIO_API_KEY: ${TTS_FISH_AUDIO_API_KEY:-}
      # AR Encryption — generate with: bin/rails db:encryption:init
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
    volumes:
      - storage_data:/rails/storage
    ports:
      - "3000:80"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neura_md_production
      POSTGRES_USER: neuramd
      POSTGRES_PASSWORD: neuramd
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuramd -d neura_md_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  storage_data:
  redis_data:
