# Infraestrutura inicial para integrações locais de IA/TTS/alinhamento.
#
# Uso recomendado como overlay:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d app kokoro mfa
#
# Este arquivo ainda não integra Kokoro ou Montreal Forced Aligner de forma
# completa. Ele apenas padroniza:
# - bind mount compartilhado
# - variáveis de caminho
# - diretórios de trabalho previsíveis
#
# Substitua as imagens placeholder quando definir a implementação final.

services:
  ai-bootstrap:
    image: alpine:3.20
    profiles: ["ai"]
    command:
      - sh
      - -lc
      - |
        mkdir -p \
          /mnt/neuramd-share/exchange/inbound \
          /mnt/neuramd-share/exchange/outbound \
          /mnt/neuramd-share/kokoro/input \
          /mnt/neuramd-share/kokoro/output \
          /mnt/neuramd-share/kokoro/voices \
          /mnt/neuramd-share/kokoro/cache \
          /mnt/neuramd-share/mfa/input \
          /mnt/neuramd-share/mfa/output \
          /mnt/neuramd-share/mfa/dictionaries \
          /mnt/neuramd-share/mfa/acoustic_models \
          /mnt/neuramd-share/mfa/temp \
          /mnt/neuramd-share/tts/rendered \
          /mnt/neuramd-share/tts/rejected \
          /mnt/neuramd-share/alignments/textgrids \
          /mnt/neuramd-share/alignments/json
    volumes:
      - ${SHARED_AI_ROOT:-/mnt/neuramd-share}:/mnt/neuramd-share

  app:
    environment:
      SHARED_AI_ROOT: ${SHARED_AI_ROOT:-/mnt/neuramd-share}
      KOKORO_ROOT: ${KOKORO_ROOT:-/mnt/neuramd-share/kokoro}
      MFA_ROOT: ${MFA_ROOT:-/mnt/neuramd-share/mfa}
      TTS_RENDER_ROOT: ${TTS_RENDER_ROOT:-/mnt/neuramd-share/tts/rendered}
      ALIGNMENT_ROOT: ${ALIGNMENT_ROOT:-/mnt/neuramd-share/alignments}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_ENABLED_PROVIDERS: ${AI_ENABLED_PROVIDERS:-ollama}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://AIrch:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    volumes:
      - ${SHARED_AI_ROOT:-/mnt/neuramd-share}:/mnt/neuramd-share

  kokoro:
    image: ${KOKORO_IMAGE:-ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4}
    profiles: ["ai"]
    depends_on:
      ai-bootstrap:
        condition: service_completed_successfully
    environment:
      SHARED_AI_ROOT: ${SHARED_AI_ROOT:-/mnt/neuramd-share}
      KOKORO_ROOT: ${KOKORO_ROOT:-/mnt/neuramd-share/kokoro}
      TTS_RENDER_ROOT: ${TTS_RENDER_ROOT:-/mnt/neuramd-share/tts/rendered}
      ALIGNMENT_ROOT: ${ALIGNMENT_ROOT:-/mnt/neuramd-share/alignments}
      # Kokoro-FastAPI e integrations OpenAI-compatible published on port 8880.
      # Keep it local-only by default; NeuraMD can reach it by Docker network or host bind.
      HOST: 0.0.0.0
      PORT: 8880
    volumes:
      - ${SHARED_AI_ROOT:-/mnt/neuramd-share}:/mnt/neuramd-share
    ports:
      - ${KOKORO_BIND:-127.0.0.1}:${KOKORO_PORT:-8880}:8880
    working_dir: /mnt/neuramd-share/kokoro
    restart: unless-stopped

  mfa:
    image: ${MFA_IMAGE:-mmcauliffe/montreal-forced-aligner:latest}
    profiles: ["ai"]
    depends_on:
      ai-bootstrap:
        condition: service_completed_successfully
    command: ["sleep", "infinity"]
    environment:
      SHARED_AI_ROOT: ${SHARED_AI_ROOT:-/mnt/neuramd-share}
      MFA_ROOT: ${MFA_ROOT:-/mnt/neuramd-share/mfa}
      ALIGNMENT_ROOT: ${ALIGNMENT_ROOT:-/mnt/neuramd-share/alignments}
    volumes:
      - ${SHARED_AI_ROOT:-/mnt/neuramd-share}:/mnt/neuramd-share
    working_dir: /mnt/neuramd-share/mfa
    restart: unless-stopped
