name: CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
      
  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RAILS_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      # Rails needs *something* for secret_key_base even when keys are loaded
      # from the initializer fallback. Dummy value for CI.
      SECRET_KEY_BASE_DUMMY: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install dtach (integration specs)
        # Runner's apt mirror occasionally 5xx's — bounded retry keeps a
        # transient mirror hiccup from failing the whole rspec job.
        # --no-install-recommends keeps the install lean (dtach has no
        # required runtime deps beyond libc).
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo apt-get update && \
               sudo apt-get install -y --no-install-recommends dtach; then
              exit 0
            fi
            echo "apt-get attempt $i failed, retrying in $((i * 5))s..." >&2
            sleep $((i * 5))
          done
          echo "apt-get install dtach failed after 3 attempts" >&2
          exit 1

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -U postgres && exit 0
            sleep 1
          done
          echo "PostgreSQL did not become ready" >&2
          exit 1

      - name: Install file-conversion tools
        # FileImports::ConvertService shells out to `markitdown` (text/docx)
        # and `uv run --with pymupdf4llm pdf2md` (PDF). Without them the 5
        # convert_service_spec cases and the 3 process_job_spec cases that
        # exercise the pipeline fail — they were red on every main run
        # before these were provisioned in CI.
        run: |
          set -euo pipefail
          pip install --quiet markitdown[all]
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Prepare databases
        run: |
          bundle exec rails db:test:prepare
          bundle exec rails db:migrate:queue || true

      - name: Precompile assets
        # System specs render application.html.erb, which pulls tailwind.css
        # via stylesheet_link_tag. Without precompile, Propshaft raises
        # MissingAssetError on every request spec that hits the layout.
        run: bundle exec rails assets:precompile
        env:
          RAILS_ENV: test

      - name: Run RSpec
        run: bundle exec rspec --format progress --no-color

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm test
