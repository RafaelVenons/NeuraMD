default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "airch"
      threads: 1
      processes: 1
      polling_interval: 0.2
    - queues: "*"
      threads: <%= ENV.fetch("JOB_THREADS", 3) %>
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
